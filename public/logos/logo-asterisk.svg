<svg viewBox="0 0 800 140" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="140" fill="#16181c"/>
  <!-- Custom 6-arm asterisk mark, drawn from rotated bars -->
  <g transform="translate(60 70)">
    <rect x="-4" y="-32" width="8" height="64" fill="#f47654" rx="1"/>
    <rect x="-4" y="-32" width="8" height="64" fill="#f47654" rx="1" transform="rotate(60)"/>
    <rect x="-4" y="-32" width="8" height="64" fill="#f47654" rx="1" transform="rotate(-60)"/>
  </g>
  <!-- Wordmark -->
  <text x="110" y="92" font-family="Inter, sans-serif" font-size="58" font-weight="700" fill="#f0ebe1" letter-spacing="-2">Justin Doone</text>
</svg>
